name: ci
on:
  push:
  pull_request:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm i --frozen-lockfile
      - run: pnpm lint
      - run: pnpm -r typecheck
      - run: pnpm -r test
      # Injection suite (C21.3) is a release gate at 100%; runs on FakeLLM so no key needed.
      - name: injection suite (release gate, 100%)
        run: pnpm --filter @apollo/desktop exec vitest run src/main/agent/injection.test.ts src/main/security/sanitizeEmail.test.ts
      # Security grep gates (C14.4): no child_process.exec anywhere in app sources.
      # Excludes method calls like re.exec()/db.exec() (regex/sqlite) — only bare
      # exec(/execSync(/child_process imports are dangerous; spawn is allowed.
      - name: grep-gate no exec()
        run: |
          ! grep -rnE "child_process|\bexec\(|execSync\(" apps/desktop/src packages/shared/src --include='*.ts' --include='*.tsx' | grep -v spawn | grep -vE "\.exec\("
      - run: pnpm audit --prod --audit-level high
      # Real-LLM eval gate: runs when the secret exists, self-reports SKIPPED otherwise (C22).
      - run: pnpm eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
