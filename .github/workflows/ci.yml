name: ci
on:
  push:
  pull_request:
jobs:
  # H9 platform parity: lint, typecheck, unit tests, and build on macOS and Windows.
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # A native source build (better-sqlite3) needs MSVC on Windows. Normally
      # native-abi.mjs verifies the installed binary and skips building, but a
      # toolchain must exist for the cases where a build is unavoidable.
      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'
      - run: pnpm i --frozen-lockfile
      - run: pnpm lint
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm --filter @apollo/desktop exec electron-vite build

  # Security + eval gates run once (macOS); they are platform-independent.
  gates:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm i --frozen-lockfile
      # These steps invoke vitest directly, bypassing `pretest`. Verify (and
      # repair, if a cached binary was built under a different Node) the
      # better-sqlite3 ABI before any suite touches the database.
      - run: node apps/desktop/scripts/native-abi.mjs node
      # Injection suite (C21.3) is a release gate at 100%; runs on FakeLLM so no key needed.
      - name: injection suite (release gate, 100%)
        run: pnpm --filter @apollo/desktop exec vitest run src/main/agent/injection.test.ts src/main/security/sanitizeEmail.test.ts
      # Egress guard (H4): zero network during embed/recall; allowlist unchanged.
      - name: egress canary
        run: pnpm --filter @apollo/desktop exec vitest run src/main/net/egressCanary.test.ts src/main/memory/egress.test.ts
      # Security grep gates (C14.4): no child_process.exec anywhere in app sources.
      # Excludes method calls like re.exec()/db.exec() (regex/sqlite) — only bare
      # exec(/execSync(/child_process imports are dangerous; spawn is allowed.
      - name: grep-gate no exec()
        run: |
          ! grep -rnE "child_process|\bexec\(|execSync\(" apps/desktop/src packages/shared/src --include='*.ts' --include='*.tsx' | grep -v spawn | grep -vE "\.exec\("
      # H3 extended grep gates: no TLS bypass, no insecure web content, no RunAsNode.
      - name: grep-gate no insecure flags
        run: |
          ! grep -rnE "rejectUnauthorized\s*:\s*false|NODE_TLS_REJECT_UNAUTHORIZED|disable-web-security|allowRunningInsecureContent|ELECTRON_RUN_AS_NODE" apps/desktop/src packages/shared/src --include='*.ts' --include='*.tsx'
      # pnpm's classic audit endpoint was retired (returns 410) mid-2026; tolerate
      # that specific failure so a registry change can't red the build, but still
      # fail on any real high-severity advisory it does report.
      - name: dependency audit
        run: pnpm audit --prod --audit-level high || (pnpm audit --prod --audit-level high 2>&1 | grep -q "410" && echo "audit endpoint retired (410) — skipping" || exit 1)
      # Real-LLM eval gate: runs when the secret exists, self-reports SKIPPED otherwise (C22).
      - run: pnpm eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
