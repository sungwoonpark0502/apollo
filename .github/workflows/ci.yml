name: ci
on:
  push:
  pull_request:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm i --frozen-lockfile
      - run: pnpm lint
      - run: pnpm -r typecheck
      - run: pnpm -r test
      # Security grep gates (C14.4): no child_process.exec anywhere in app sources.
      - name: grep-gate no exec()
        run: |
          ! grep -rnE "child_process|\bexec\(|execSync\(" apps/desktop/src packages/shared/src --include='*.ts' --include='*.tsx' | grep -v spawn
      - run: pnpm audit --prod --audit-level high
